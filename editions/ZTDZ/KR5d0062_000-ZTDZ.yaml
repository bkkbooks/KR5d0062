front:
  text: 三論元㫖序夫一悟所通乃無幽而不照一迷所執亦無往而不愚是知附贅懸疣則形之病焉妄想煩惱則心之病焉形病除而形骸泰矣心病泯而正性明矣除形病者必假於良醫泯心病者必資於妙教自然之理猶乎鑪錘而成生也有涯須運庖丁之力禀明師而作範禀範隨樞憑至典而爲筌忘筌覩奥市廛黑暗則喪本而乖眞靈府清虛亦神全而氣妙神全乃長生之本氣妙爲不死之源同乎大通莫不因修而達矣予久依山水遠託幽棲以不替之心契無爲之性恬乎林野玄意常盈聊舉一隅以爲三論雖文純若鄙而理也可憑庶學者無疑修之有證死生大患孰不傷哉普勸將來共觀其妙爾三論元㫖
