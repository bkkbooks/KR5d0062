body:
  text: 道宗章第一夫道之宗也幽微奥妙理之極也靈運潜通體而一焉應乎萬矣夫稱無爲無上無極無窮道性眞性理性玄性虛無自然虛通解脫至精至妙至聖至眞清靜清虛非生非滅者此之多應於理無差悉是大道至人靈宗之號悟則通聖迷則滯凡迷悟有乖至眞何硃玄寂非遠達妄則眞蒼生滯有色之迷聖人說無爲以破衆滯指空無之境演微妙之源了此空色無執滯之妨則眞常之性見矣故本際經云謂執性故因縁方便說諸法假說執假故因縁方便說諸法空洞達眞性眞性通流亦何空假之能礙矣然而未悟須息紛塵至精非色想所觀至奥豈浮情能測若不澄虛滌想無以全眞縱廣學多端無虛寂之照終不悟也然見形而不返神者迷之甚也不達神源而稱至性者理未然也夫說無遣有說有遣無說是遣非說非遣是此皆是遣滯之言非至道之妙或迷神而滯網或役智以疲神或滯有而增塵或隨空而斷見或尋迹而喪本或滯寂而乖眞或躭文好辯而溺澆華或小慧微通自爲眞實究極修行未悟而疑悔生焉或不修不信乃沉於永劫此之難也有隔眞源若不通行或非至妙通行之要寄在虛妄虛而通之眞宗道也神心也性理也即道理也虛妄章第二三篇夫至妙眞微希夷窈邈可以冥心潜會非乎聲色可求悟之者靈鏡朗然則神融道矣所以通幽契奥澄虛滌想而能明眞明而且眞不死不生之要也故本際經云譬如積夜暗室一念燈明諸暗皆盡猶彼妄心普滌神智流通正見圓明亦復如是然以乆流慾海妄念增浮種種多端如何卒息也故聖人言守一千徒迷一萬惑是以凝照迷一萬惑畢竟自消萬惑既消一而亦泯以至無知無一也境聲色都冥心至此地乃虛妄致也則囂塵普滌寂爾無爲諸網消融自然焕悟然因澄而靜因靜而忘因忘而後能明因明而後能達從微至著了悟成眞猶霽雲收覩太陽之景澄虛契妙理亦如然當忘之時不知其所以忘泯然而故也未忘未明之前所知所見悉是忘知忘見未達故也已忘以明了悟之際所知所見悉是眞知眞見然眞見無所不見雖見而無心妙達神識智性一相流通則曰眞常之道悟一也忘一也守一也乃曰眞常夫亂心多故方今守一然所修之者須要㫖歸契理則至妙可通失所則勞而徼矣虛妄之法安然而坐都遣外景内靜觀心澄彼紛葩歸乎寂泊若心想剛躁浮游攝而不住者即須放心遠觀四極之境先觀東方無極世界迴入空冥之際窈眇之中南西北方亦如是矣令心想想極方始收歸亦須從頂至足觀身虛假盡是無常如斯内外觀之自然調伏融而照一便亦安然如於一中覺有差起動念之心即須澄滅隨動隨滅至於無動无滅境无取捨虛寂一然如澄差心不滅亦可心依炁息同融而觀亦可怡神而已精照一源理須虛融得所調暢和柔若捉心太急急則傷心放心太寬寬則失理所言放心於四極之境爲剛躁浮游故也此乃暫爲而已爲境可忘方便之門要乎住一神氣二觀況亦如然夫於放心之時勿令心斷泯心之際勿覺心著若以當坐之界縱見一切光明聖賢乖異妖祥皆不可取取則失心常須凝照内澄乆而妙也此乃非唯於坐行之際安心寂泊於理亦然自此已上攝心歸一則是攝心凝觀初心之所修自此已下灰心忘一則是忘心遺觀次心之所學也夫因攝萬此亦未眞假攝一而爲筌忘筌而能泯矣泯一之法滅所見一之心若見於一即須澄滅隨見隨滅至無見無滅則形同槁木心若死灰境智兩忘泯然不知其所以此謂内外都遣忘一者也夫忘一者心謂照心都絶煩惱洗然猶彼清泉而滌穢器器中既凈方堪善用心澄普釋方可致眞故經云常無欲以觀其妙然妙既妙矣忘亦眞矣所謂都忘内外然後超然俱得者也妙斯之悟則無知而能眞知忘一而達眞一矣非唯於一抑亦一切統然是知一爲萬之所宗萬爲一之所用也不一之一得之眞一眞一之源本無假雜非今非古何滅何生故太上經云寂寥獨立不改周行不殆此之謂也妙達此源竟無差舛心等於道道能於心即道是心即心是道心之與道一性而然無然無不然故妙矣在有不滯於有而不乖於無在無不滯於無而不乖於有無所不在無所不通融神去會眞常之性契矣所謂通心達觀極乎無極者矣衆生沉淪苦海莫不因心而然滅妄歸眞白然之源妙矣一者生氤氲也氤氲生於兩半夫攝心住一名爲安定灰心忘一名爲滅定悟心眞一名爲泰定身騰羽化名曰仙人形等眞神名曰眞人體同於性名曰聖人心鏡明慧名曰悟仙之人心達眞神名曰悟眞之人心合眞性名曰悟聖之人然三定四等之心能階至道四等心者爲麤細微妙也是以澄修之人極麤而至細極細而至微極微而至妙極妙而道矣然愚癡狂躁謂之麤清柔純素謂之細神融虛寂謂之微至奥眞源謂之妙澄心内照觀想皆空麤惑普消謂之達麤細妄盡滅謂之達細曉了神微謂之達微悟道妙通謂之達妙又夫結氣色身謂之麤游氣通息謂之細神智鑒用謂之微正性眞常謂之妙修爲納養夭損普消謂之達麤和氣流通謂之達細形神同等謂之達微形性泯然謂之達妙是知色身爲麤游氣爲細神智皆微正性常妙夫妙者何爲哉對麤而說故也衆生滯麤所以令修於妙其於道也奚妙之乎於道以爲言則無妙無不妙對物以爲言則有妙有不妙於道以爲言則無修無不修對物以爲言則有修有不修矣以因神達性不神而神因麤棄妙非妙而妙然灰心滅智而坐虛妄者寂滅法也融神育氣而坐兼忘者長生法也生而後滅者謂之寂滅滅而後生謂之眞生能達滅後之生則泯眞空妙有矣然迷而三界是三清事則易知理難達者也夫不爲空有可欲之所亂常融心湛然之地者其至人藴奥之心乎然所猿猱狩不可卒而禁制者其猶衆生狂愚乎夫息亂以靜守靜以常動而能澄靜而能照則縁智縁性而虛妄眞智眞性而曉了者此乃至悟之士也夫安其和寡其欲守其樸無聽之以耳而聽之以心無聽之以心而聽之以氣無聽之以氣而付之以性於事全而能忘於理忘而能全者此則兼通之士也夫尋文視聽而知於性者假矣澄虛内照而合於性者眞焉能遺假而通眞則假亦眞矣眞源章第三五篇夫道以虛通育物徧備群方眞源則神應靈微氣運乃隨方成器然有形之類皆資炁以生焉有識之知悉禀神而謂矣夫神者性之用識者神之用夫元氣者性之用陰陽炁者元炁之用色相陰陽炁之用矣故太上經云道冲而用之南華經云精神生於道此之謂也坦然備一切之際謂之性獨然徧一身之際謂之神夫身者神識之所器心者神識之所都故西昇經云身者神之舍識亦因神而生夫神之於識猶日之於光光因日而生光非日體識因神而起而識非神眞神於身内能識於外性普湛然動不乖寂以神望性則性妙而神麤以神望身則身麤而神妙然性神識之由本同而用異悟則通神合性迷則滯識乖神夫滯識乖神者隨氣運而淪死生通神合性者妙然而能常白在是以有性之物謂神感氣而成形故形識雙備矣無情之類禀炁而已不禀於神故有形而無識是知神能爲物之識不能爲物之形炁能爲物之形不能爲物之識則性神有靈炁相無識者也然禀陰陽五行之炁者乃更盛衰至於正性眞源常無盈竭夫質生之物炁散而爲死炁聚而爲生然炁有聚散之差神無生滅之别是知用神而能運炁因炁亦能資神聚則同成散而各運夫葷羶穢味能資陰陽之濁炁妙藥清和能資元和之正炁正炁全而資神者則無爲無欲陰陽之炁濁而資神者則多欲多爲然多欲多爲則夭枉流溺之源無爲無欲則湛爾常存之要物之本生則中道而起滯識遷生乃隨業而行輪轉不離於道中不悟道而何也然有情有相則有别有分逐境生縁積縁成業受報不通返照故也能悟玄微湛然虛妙雖縁而非縁雖境而非境不爲縁境之所攝亦何業報之有哉夫三業六根紛惑者則炁濁情昏靜慮全虛則神清氣爽故本際經云響清濁隨其本聲又云皆由衆生業縁所感故西昇經云積善之氣至積惡之氣至然惡氣濁壯增黑暗而生迷善氣清全洞虛明而曉朗明而曉者若撥霧而覩青天黑而暗者乃渾河而被流溺是以暗明雙遣善惡兩冥至極直源流通妙本者則白然之奥也夫白然者無爲之性不假他因故曰自然修行之人因有爲而達無爲因有生而達無生了乎白縁契於白然則無生之性達矣性不無生而能無所不生無所不生而妙本未嘗爲生是以無爲之爲無相之相者道之妙體也有爲之爲有相之相者道之麤用也妙本之於無本也夫心者衆邪之主亦爲衆妙之門然性神識之源深莫不因心而召照達夫蠢爾蒼生名愚識罔知禮法名爲淺識辯慮聰明名爲智識恬柔素樸名爲淳識澄心虛寂名爲靜識灰心滅智名爲忘識内鑒分明名爲慧識曉達神直名爲微識洞達性海名爲妙識嗟乎時人滯麤識者衆焉達神微者尠矣夫達神者非無於識雖識而通滯識者非無於神雖神而隔達神微者則神之與識體用雙明滯麤識者偏見於識不會於神矣又欲會神通性者先修攝念觀次修忘心觀則灰心滅智諸境寂然外聽無聲内視非色於無色之際豁然微悟神靈虛融此則神理矣融神虛泯杳會無涯坦然浩蕩而玄通妙性眞宗而達矣是知以識照識極識而通神以神照神極神而通性通性則性自見性通神亦神自見神然神自見神性自見性者此則眞見也以識見神以神見性者此乃妄見也然達得定心猶不墮於惡道而況神通合性者乎蓋神微性妙性雖有靈本體湛然而無妄衆生滯識不通者名爲妄心曉達神源不捨妄而眞也然性之爲體在空同空而非空在色同色而非色而能徧空色常寂常通所謂大無不包細無不入一未入三界二入無色界三入色界四入慾界五入惡道夫妙藥可以養和坐忘而能照性養和而形不死達性而妄不生然不死不生則形變通神羽化眞仙之道也故上清太清眞誥等經皆云金丹妙藥鍊氣通神可以輕舉仙騰登眞合聖者也是知妄想除而爲悟道之要神氣泰亦爲不死之樞妄不除而稱修道者猶執瞽以求明鍊想寂而通神眞者若鑽木而興焰矣夫精思坐忘通神悟性者此則修神之法也導引形軀吐納元和者此則修身之法也然修神而不修炁者滅度之法也修炁而不修神者延年之法也神炁兼而通修者學仙之法也夫修神以鍊心爲首納炁以導引爲先導引暢於太和鍊心通於衆妙足使神融虛白炁逸清全變神炁而流通亦何眞而不備故夫上士修道則塵勞普釋曉了眞源正智圓融含融養妙全和而命續猶爲薪而火傳乆視長生乃昇霓於仙景從仙入眞從眞合聖聖則流通之妙也此乃不捨有爲之軀而達無爲之性也中士修眞心源曉達身相同凡滅棄漏軀方之聖境此乃捨有爲之形達無爲之性矣上士形神俱達永妙眞源中士神達身沉然須滅度下士神形未達可以隨業遷因道常一相自然物有萬端之别道能生於物即物而非道眞然以道觀之則萬物萬法洞通於一道以物觀之則萬物萬法各執於一途物雖差而道不差法雖異而道不異有爲滅而道不滅空色斷而道不斷實相湛然而然虛通一切自在者即大通之道也然夫道者乃萬法之根源妙達眞常則返本還元之謂矣道之於衆生猶帝之於黎庶登帝位者萬法歸焉達妙道者萬法而亦見矣故本際經云具一切智成無上道之謂也色聚識聚心聚想聚四聚成乃善惡生也夫大乘平等無盈無端漸教法門有修有證是知因舟而能達岸達岸而捨舟因學而以成功功成而學亦遣故德經云爲學日益爲道日損損之又損以至於無爲無爲而無不爲夫爲學者日益有爲之見爲道者日損有爲有見之知因損有以通無能通無而具有然眞源湛寂應感隨機衆生根有利鈍之差聖人教亦漸頓之别且修行有爲名爲漸教眞證無爲名爲頓教眞性周普徧備群方名爲道應在漢說經於胡演教名爲别應一切衆生性同道性名爲通感隨類受器名爲别感故海空經云聖人無爲衆生故應有爲又云衆生感聖因縁不同聖應衆生其體亦異是以妙本湛然名曰眞身演爾法相名曰應身隨因受果名曰報身故有妙中之麤麤中之妙聖人應有爲即是妙中之麤衆生悟無爲則是麤中之妙然而一切萬法元從窈冥中來自然之理具焉因縁之方同矣故夫道一性而能應於一切神性一神而能應於一切物物禀神一而能應乎一切識應神作合生之智應炁爲萬類之形應身垂聖化之慈應性導群迷之惑夫性者虛無自然之妙靈也應聖者性之妙用也應神者性之微用也應炁者性之細用也色相者性之麤用也然應聖者應身之聖人也相者天地萬物一切有爲之形相也是以應能生萬物而非能生能成萬物而非能成能有萬物而非能有能空萬物而非能空非物而能物不碍於物非法而能法不滯於法應而不乖其本者則惟大道眞常之性焉六合群興而道也非興三界劫變而道也非變修而能合於道者莫先於神矣而炁乃次之夫身三萬六千神者則一身所生統運也用異而通歸一者亦由手足於身乎相中又相乃是異中而同神中又神則是同中而異雖則有無對立而事理兼通故自然中有因縁因縁中有自然自然不離於因縁因縁不離於自然而能異之而同者矣然夫一切因縁者悉是自然之因縁也從本降迹隨所用而多差攝迹皈本亦包羅而無外眞體包羅萬象玄應變化大千故能妙統一神分别百億也蓋不别寶者無以知其貴不明道者無以體其眞物禀道而生故物有道性不悟道者由弱喪之俗迷童至教應焉則教能筌理不知於教者乃八難之矣憂訾毁聖亦三塗痛之然以道無不在抑亦不慮衆生悟則能通相去何遠故眞藏經云一切煩惱皆爲正性之比頓即妄而眞所謂動不乖寂寂不乖動應常能眞眞能常應者矣故西昇經云道不獨在我萬物皆有之是以能行者能通能通則聖也眞一正一三一守之道成夫混成大象應用多端未悟之人理難正信今引諸經要證用遣疑者之心故太上經曰太象無形又西昇經云天下柔弱莫過於道道之所以柔弱者包裹天地貫穿萬物眞藏經云天下柔弱包羅無外妙少細微南華經云至精無形至大不可圍此明至道無爲包羅萬象老子經云道生之德畜之太上三清天正經云道大渺莽幽幽太無變化而生炁焉太平經云道包無表裏其能生精神南華經云夫道有情有信無爲無形神鬼神帝生天生地此明神之與炁天地萬物皆爲道用者焉西昇經云念我未生時未有身也眞以積氣成我身爾又云形不得神不能自生神不得形不能自成形神合同更相生成此明有性之類皆謂神炁相感生成於身神在螻蟻之中能等螻蟻之體神在象馬鵾鵬之中亦等鵾鵬象馬之形神隨質而短長質依神而起用分别善惡謂之識潜幽靈變謂之神能運於身者其惟神乎身在神存神去則身死夫身禀一神乃生三萬六千之神身死之際三萬六千之衆還歸一神而乃去之一神居之而等一身於一之中而等衆神禽獸禀一是同未若人之數備於神多少既爾於氣清濁亦然所感萬差故有多異草木之類惟氣所生不禀神成故無識用既無於識是亦無業本際經云誦念是經即得開度神昇南宫度人經云魂神暫滅不經地獄即得返形又億曾萬祖幽魂苦爽皆即受度此明修善之人神歸善道非唯於己亦及於親大戒經云心神振動生於愛慾使人迷荒本際經云多所傷害身死神去流轉三途此明爲惡之人神受苦對昇玄經云幽通虛閑神朗希夷業報經云冥心靜慮歸神通道南華經云離形去智同於大通本際經云不可使然不可不然故曰自然悟此眞性名爲悟道此明虛妄之人通神悟性蟬蛻小神之人假神歸大道之眞夫道之於稱性者異名爾夫火性而用能應燥水性而用能應濕者此明五行之性非至道之性也五行既爾萬象可知雖則大同亦還小異是以無情之類皆有種性有情之物皆有縁性至道虛通謂之妙性矣本相經云愛神護氣能致長生業報經云鍊炁易形轉神歸道西昇經云與道同身而無體此明形之與炁俱鍊變而成神轉神歸道與道同神是能包羅萬象神乃惟等一身神禀道而能靈物禀神而有識道乃湛然一相妙體眞常神之與炁二差俱爲道用炁則無涯無際神則有轉有遷神靈而炁不靈炁廣而神不廣炁則有清有濁神則有興有歇湛爾常然其惟道矣是以博學多聞能益於識存眞鍊炁能益於神神益通無待之源識益增有爲之用有爲則有窮有極無爲則無窮無極奈悠悠之徒不知此之妙也昇玄經三科法行云此法輪三科乃是經法之常科無量世之常科萬聖所不能異也科有上士中士下士而末章云教導三乘即三士是三乘也更無别指士者事也夫至士者一之行懷誓必得道終卒其事理無中廢士以能卒爲義乘以運載爲道謂言其略曰上士廣開法關先人後己救度國君損己濟物仁及鳥獸惠逮有生恭師奉法常如對神長齋苦思精研洞玄吐故納新心灰體槁意勤氣柔人神並勸如此之行一滅一生志不退轉尅成上仙一者行二者願三者慈四者悲行者如百八十戒二百四十威儀但攝身口意萬善之法悉是行也十二上願願也四十五念慈也並出洞玄靈寶經方便開度者則金籙開度天子王侯黄籙開度祖禰白然開度一切衆生是悲也行以絶惡爲義願以玄期爲契慈者以德蔭萬物悲者以拔苦爲懷四科之道既立即有一報之斷矣中士志慕在玄開度一切救厄解患施功報德建玄福田君親忠孝柔智懷仁虛心至道口味靈篇食不念飽衣不嫌寒衆行並備三滅三生補九宫眞人修玉清上道其行也謹修三百大戒誦大洞三十九章思三一之法持戒以絶惡則五道無對誦經以靜神則心不外驅存一以空心則神心淡泊淡泊定則鏡覩至道昇入無爲世報絶矣下士斷情忍色服御養神願棄榮麗栖憩山林愛山樂水淡泊守固絶穀休粮長齋念道端坐則與師相對入出則與鳥獸爲群孤旅岩宂獨宿空山切栢擬飡面有飢容心如懷丹見試不恐神靜心安如此之行上感虛皇九滅九生志願不退尅得變化乘雲飛行游宴五嶽逍遥太無從此而進位登高仙此與中士同修玉清之道經云六通觀法者五色五音五味五香五財華麗榮飾一切亂性經云天曰洞視地曰洞聽東曰洞空西曰洞虛南曰洞清北曰洞微六通智慧觀道成就則捨除無量塵累塵累既盡名曰六通仙人經曰慧眼慧耳慧鼻慧口慧身慧心入希夷之道出三界法一切皆空名爲六通三界經云持戒者齋净之根靜者精思之本精思者降眞之由降眞者昇道之寶經云三寶之炁在心三寶之士在迹迹者籍也易也在心存思行心履迹變邪從正積善立功之德備充至乎宗極極乎無極引接衆流導其有志經云精神内室元炁長存即長生乆視之道夫炁以空虛爲體形色爲用精以杳冥爲體光音爲用神以微妙爲體變化爲用經曰視之不見夷也聽之不聞希也摶之不得微也此則神炁精三一之道而混三爲一散一爲二一者無也不一之一謂之眞一也三論元㫖
